<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Proquot</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="site-header" data-include="layout.html#header"></div>

  <main class="container">
    <section class="contact-page">
      <h1>Contact Proquot</h1>
      <p>Send us a message to request a demo or discuss your project.</p>
      <form class="contact-form" action="#" onsubmit="return false;">
        <label>
          Name
          <input type="text" name="name" required>
        </label>
        <label>
          Email
          <input type="email" name="email" required>
        </label>
        <label>
          Company
          <input type="text" name="company">
        </label>
        <label>
          Message
          <textarea name="message" rows="5" required></textarea>
        </label>
        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <div id="site-footer" data-include="layout.html#footer"></div>

  <script src="script.js"></script>
</body>
</html>
